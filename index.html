<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Water Ring Toss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title">Water Ring Toss</div>
      <div class="scoreCol">
        <div class="score" id="score">0</div>
      </div>
    </div>
    <canvas id="game" width="420" height="640"></canvas>
    <div class="controls">
      <button id="leftBtn" aria-label="Left Jet">Left</button>
      <button id="resetBtn" aria-label="Reset">Reset</button>
      <button id="rightBtn" aria-label="Right Jet">Right</button>
    </div>
    <div class="help">Press A / D or hold the buttons — M to mute</div>
  </div>
  <script src="main.js"></script>
</body>
</html>
